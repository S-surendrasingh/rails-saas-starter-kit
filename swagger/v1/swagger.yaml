---
openapi: 3.0.1
info:
  title: Rails SaaS Starter Kit API
  version: v1
  description: API documentation for Rails SaaS Starter Kit
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
paths:
  "/api/v1/signup":
    post:
      summary: Signup user
      tags:
      - Authentication
      parameters: []
      responses:
        '201':
          description: Signup successful
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                password:
                  type: string
                password_confirmation:
                  type: string
              required:
              - name
              - email
              - password
              - password_confirmation
  "/api/v1/login":
    post:
      summary: Login user
      tags:
      - Authentication
      parameters: []
      responses:
        '200':
          description: Login successful
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
              required:
              - email
              - password
  "/api/v1/posts":
    get:
      summary: Fetch posts
      tags:
      - Posts
      security:
      - bearerAuth: []
      parameters:
      - name: page
        in: query
        schema:
          type: integer
      - name: status
        in: query
        schema:
          type: string
      - name: search
        in: query
        schema:
          type: string
      responses:
        '200':
          description: Posts fetched successfully
    post:
      summary: Create post
      tags:
      - Posts
      security:
      - bearerAuth: []
      parameters: []
      responses:
        '201':
          description: Post created successfully
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                content:
                  type: string
                status:
                  type: string
              required:
              - title
              - content
  "/api/v1/profile":
    get:
      summary: Get current user profile
      tags:
      - Profile
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Profile fetched successfully
servers:
- url: http://localhost:3000
  description: Local development server
